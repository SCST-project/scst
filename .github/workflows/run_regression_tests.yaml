name: Run regression tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: '35 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regression-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  MATRIX_PR: >-
    ["6.12.63"]
  MATRIX_PUSH: >-
    ["6.12.63","5.15.197","5.14.0-611.16.1.el9_7^AlmaLinux^9.7"]
  MATRIX_NIGHTLY: >-
    ["6.18.2","6.12.63","6.6.119","6.1.159","5.15.197","5.10.247","4.19.325","3.10.108","6.12.0-124.21.1.el10_1^AlmaLinux^10.1","5.14.0-611.16.1.el9_7^AlmaLinux^9.7","4.18.0-553.87.1.el8_10^AlmaLinux^8.10","3.10.0-1160.118.1.el7^CentOS^7.9.2009","6.12.0-106.55.4.2.el10uek^UEK^10","5.4.17-2136.350.3.2.el8uek^UEK^8"]

jobs:
  regression_tests:
    name: ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(github.event_name == 'schedule' && env.MATRIX_NIGHTLY || github.event_name == 'workflow_dispatch' && env.MATRIX_NIGHTLY || github.event_name == 'push' && env.MATRIX_PUSH || env.MATRIX_PR) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libelf-dev libsqlite3-dev sparse
          if ! command -v smatch >/dev/null 2>&1; then
            sudo apt-get install -y smatch || true
          fi
          if ! command -v smatch >/dev/null 2>&1; then
            git clone --depth 1 https://github.com/error27/smatch.git
            cd smatch
            make -j"$(nproc)"
            sudo BINDIR=/bin SHAREDIR=/home/runner/share make install
          fi

      - name: Run regression tests
        run: |
          set -euo pipefail

          err=0
          version="${{ matrix.version }}"
          safe_version="${version//[^[:alnum:]._-]/_}"
          workdir="/tmp/scst-${safe_version}"
          out="artifacts/output-${safe_version}.txt"

          mkdir -p artifacts

          ./scripts/run-regression-tests -l -q -d "${workdir}" "${version}-nc-ns-nm" | tee "${out}"
          cmd_rc=${PIPESTATUS[0]}
          if [ "${cmd_rc}" -ne 0 ]; then
            err=1
          fi

          if ! grep -q "Compiling the patched kernel" "${out}"; then
            echo "::error title=Regression tests::run-regression-tests failed"
            err=1
          else
            if grep -A1 "Compiling the patched kernel" "${out}" | grep -E -q "FAILED|[1-9][0-9]* errors"; then
              echo "::error title=Regression tests::Regression test failed"
              err=1
            else
              echo "::notice title=Regression tests::Succeeded"
            fi
          fi

          if comp=( "${workdir}"/compilation-*-output.txt ) && [ -e "${comp[0]}" ]; then
            cp "${comp[0]}" "artifacts/$(basename "${comp[0]}")"
            echo
            echo "===== $(basename "${comp[0]}") ====="
            cat "${comp[0]}"
          fi

          {
            echo "### Regression profile"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Kernel: \`${version}\`"
            echo "- Result: \`$([ "${err}" -eq 0 ] && echo pass || echo fail)\`"
          } >> "$GITHUB_STEP_SUMMARY"

          rm -rf "${workdir}"
          exit "${err}"

      - name: Upload regression logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: regression-${{ replace(replace(replace(matrix.version, '^', '_'), '/', '_'), ':', '_') }}-logs
          path: artifacts/
          if-no-files-found: error

  nightly_quality:
    name: nightly-quality
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential libelf-dev libsqlite3-dev sparse
          if ! [ -e "/lib/modules/$(uname -r)/build/Makefile" ]; then
            sudo apt-get install -y "linux-headers-$(uname -r)" || \
              sudo apt-get install -y linux-headers-generic
          fi
          if ! command -v smatch >/dev/null 2>&1; then
            sudo apt-get install -y smatch || true
          fi
          if ! command -v smatch >/dev/null 2>&1; then
            git clone --depth 1 https://github.com/error27/smatch.git
            cd smatch
            make -j"$(nproc)"
            sudo BINDIR=/bin SHAREDIR=/home/runner/share make install
          fi

      - name: Run W=1, sparse and smatch builds
        run: |
          set -euxo pipefail
          mkdir -p artifacts

          make 2release
          make PASS_CC_TO_MAKE=1 W=1 all 2>&1 | tee artifacts/w1-build.log
          make PASS_CC_TO_MAKE=1 C=2 -C scst/src all 2>&1 | tee artifacts/sparse-scst-src.log
          make PASS_CC_TO_MAKE=1 C=2 CHECK=smatch -C scst/src all 2>&1 | tee artifacts/smatch-scst-src.log

          {
            echo "### Nightly quality checks"
            echo "- W=1 build: done"
            echo "- sparse profile: done"
            echo "- smatch profile: done"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly quality logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-quality-logs
          path: artifacts/
          if-no-files-found: error
